<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Riri ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <div class="hero">

        <h1>Happy Birthday Riri 🌸</h1>

        <p class="subtitle">
            Untuk seseorang yang selalu berhasil membuat hari-hariku lebih indah.
        </p>

        <button onclick="window.open('surat.html','_blank')">
            Buka Surat 💌
        </button>

    </div>

    <section class="section">

        <h2 style="margin-bottom:30px;">Kenangan Kita 📸</h2>

        <div class="gallery">

            <img src="ribit 3.jpeg">
            <img src="ribit22.jpeg">
            <img src="ribit2.jpg.jpeg">

        </div>

        <p style="margin-top:20px;">
            Lucu yaahh kitaaa ❤️
        </p>

    </section>

    <section class="section">

        <h2 style="margin-bottom:30px;">
            🌷 Wish Jar Untuk Kamuu 🌷
        </h2>

        <div class="jar">

            <p>
                Klik tombol di bawah untuk membuka harapan spesial ✨
            </p>

            <button onclick="showWish()">
                Buka Harapan 💖
            </button>

            <div class="note" id="wishBox">

                🌸 Sebuah harapan sedang menunggu...

            </div>

        </div>

    </section>

    <footer>

        Aku Sayang Kamu, Riri ❤️

        <br><br>

        — Tsabit

    </footer>

    <script>

        const wishes = [

            "🌷 Semoga kamu selalu sehat dan bahagia.",

            "💖 Semoga semua impian dan keinginan tercapai satu per satu.",

            "✨ Semoga tahun ini penuh dengan kejutan yang indah.",

            "🌸 Semoga senyum kamu tidak pernah hilang.",

            "🎂 Semoga ulang tahun kali ini menjadi awal dari banyak kebahagiaan baru.",

            "🩷 Terima kasih sudah hadir di hidup aku.",

            "🌹 Semoga kita bisa terus membuat kenangan yang indah."

        ];

        function showWish() {

            const random =
                wishes[Math.floor(Math.random() * wishes.length)];

            document.getElementById('wishBox').innerHTML = random;

        }

        function createFlower() {

            const flower = document.createElement('div');

            flower.classList.add('flower');

            flower.innerHTML = '🌸';

            flower.style.left = Math.random() * 100 + 'vw';

            flower.style.fontSize =
                (20 + Math.random() * 20) + 'px';

            flower.style.animationDuration =
                (5 + Math.random() * 5) + 's';

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 10000);

        }

        setInterval(createFlower, 300);

    </script>

</body>

</html>
